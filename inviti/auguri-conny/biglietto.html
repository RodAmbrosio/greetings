<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buon Compleanno Conny</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500;1,600&family=Jost:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
        }

        body {
            font-family: "Jost", sans-serif;
            background: radial-gradient(ellipse at 50% -10%, #f7d9d4, #f0c4bc 60%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card {
            width: 380px;
            background: linear-gradient(180deg, #faf3e6, #f3e6cd);
            border-radius: 22px;
            padding: 28px 28px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, .5);
            position: relative;
            overflow: hidden;
            color: #3a2b2a;
        }

        .card::before {
            content: "";
            position: absolute;
            top: -80px;
            left: -80px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(217, 140, 134, .2);
        }

        .card::after {
            content: "";
            position: absolute;
            right: -70px;
            bottom: -70px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(232, 184, 75, .2);
        }

        .content {
            position: relative;
            z-index: 2;
        }

        .eyebrow {
            letter-spacing: .35em;
            text-transform: uppercase;
            font-size: 13px;
            color: #a94438;
            font-weight: 500;
        }

        .bloom {
            width: 72px;
            margin: 8px auto 4px;
        }

        h1 {
            font-family: "Cormorant Garamond", serif;
            font-style: italic;
            font-weight: 600;
            font-size: 38px;
            color: #3a2b2a;
            margin-top: 4px;
        }

        h2 {
            font-family: "Cormorant Garamond", serif;
            font-weight: 600;
            font-size: 56px;
            color: #a94438;
            margin-top: 2px;
        }

        .years {
            margin-top: 8px;
            font-size: 18px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #8a6a2a;
            font-weight: 500;
        }

        .message {
            margin-top: 14px;
            font-size: 22px;
            line-height: 1.7;
            color: #4a3a38;
            font-weight: 400;
        }

        .arrow {
            font-size: 24px;
            margin-top: 8px;
            color: #a94438;
        }

        .scan {
            margin-top: 4px;
            font-size: 17px;
            letter-spacing: .06em;
            text-transform: uppercase;
            font-weight: 500;
            color: #3a2b2a;
        }

        #qrcode {
            margin-top: 8px;
            display: flex;
            justify-content: center;
        }

        .footer {
            margin-top: 14px;
            font-family: "Cormorant Garamond", serif;
            font-style: italic;
            font-size: 25px;
            color: #a94438;
        }

        .small {
            margin-top: 6px;
            font-size: 12px;
            color: #9a8a7a;
        }

        @media print {

            html,
            body {
                background: #ffffff !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                padding: 0;
            }

            .card {
                background: #ffffff !important;
                box-shadow: none;
            }

            .card::before,
            .card::after {
                display: none;
            }

            .small {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="content">
            <div class="eyebrow">Un invito speciale</div>
            <div class="bloom">
                <svg viewBox="0 0 100 100">
                    <path
                        d="M50 82 C20 62, 8 40, 22 24 C33 12, 48 18, 50 32 C52 18, 67 12, 78 24 C92 40, 80 62, 50 82 Z"
                        fill="#d98c86" opacity="0.9" />
                </svg>
            </div>
            <h1>Buon Compleanno</h1>
            <h2>Conny</h2>
            <div class="years">23 anni</div><br>
            <div class="message">
                Amore mio,<br>
                ho preparato qualcosa per festeggiarti come meriti.
                Un piccolo segreto ti aspetta.
            </div>
            <div class="arrow">↓</div>
            <div class="scan">Inquadra il QR code</div>
            <div id="qrcode"></div>
            <div class="footer">Con tutto il cuore</div>
            <div class="small">Scansiona per scoprire la sorpresa</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // Quando pubblichi su GitHub Pages, aggiorna questo link
        // con il percorso reale di index.html (es. .../auguri-conny/)
        const QR_URL = "https://rodambrosio.github.io/greetings/inviti/auguri-conny/";

        new QRCode(document.getElementById("qrcode"), {
            text: QR_URL,
            width: 160,
            height: 160,
            colorDark: "#a94438",
            colorLight: "#f6ecdd",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>

</html>
