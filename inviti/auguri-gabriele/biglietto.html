<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Buon Compleanno Gabriele</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {

            font-family: "Comic Sans MS", Arial, sans-serif;

            background:
                linear-gradient(180deg, #7ee7ff, #38c8ff, #0a79d8);

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            padding: 30px;

        }

        .card {

            width: 430px;

            background: white;

            border-radius: 35px;

            padding: 35px;

            text-align: center;

            box-shadow:
                0 15px 40px rgba(0, 0, 0, .25);

            position: relative;

            overflow: hidden;

        }

        .card:before {

            content: "";

            position: absolute;

            top: -120px;
            left: -120px;

            width: 260px;
            height: 260px;

            border-radius: 50%;

            background: rgba(173, 236, 255, .5);

        }

        .card:after {

            content: "";

            position: absolute;

            right: -100px;
            bottom: -100px;

            width: 220px;
            height: 220px;

            border-radius: 50%;

            background: rgba(173, 236, 255, .35);

        }

        .content {

            position: relative;

            z-index: 2;

        }

        .bubble {

            width: 220px;
            height: 220px;

            margin: auto;

            border-radius: 50%;

            background:
                radial-gradient(circle, #ffffff, #aee9ff, #57c9ff);

            display: flex;

            justify-content: center;

            align-items: center;

            box-shadow:
                0 10px 20px rgba(0, 0, 0, .15);

        }

        .shark {

            width: 170px;

            animation:
                float 3s ease-in-out infinite;

        }

        @keyframes float {

            50% {

                transform:
                    translateY(-12px);

            }

        }

        h1 {

            margin-top: 20px;

            color: #0095ff;

            font-size: 42px;

        }

        h2 {

            font-size: 52px;

            color: #0056b3;

            margin-top: 5px;

        }

        .years {

            margin-top: 15px;

            font-size: 30px;

            font-weight: bold;

            color: #ff9800;

        }

        .message {

            margin-top: 25px;

            font-size: 24px;

            line-height: 1.6;

            color: #444;

        }

        .arrow {

            font-size: 48px;

            margin-top: 20px;

            animation: bounce 1s infinite;

        }

        @keyframes bounce {

            50% {

                transform:
                    translateY(8px);

            }

        }

        .scan {

            margin-top: 15px;

            font-size: 24px;

            font-weight: bold;

            color: #0078d7;

        }

        #qrcode {

            margin-top: 20px;

            display: flex;

            justify-content: center;

        }

        .footer {

            margin-top: 30px;

            font-size: 24px;

            color: #0066cc;

            font-weight: bold;

        }

        .small {

            margin-top: 10px;

            font-size: 14px;

            color: #888;

        }

        @media print {

            body {

                background: white;

                padding: 0;

            }

            .card {

                box-shadow: none;

                width: 100%;

                height: 100%;

            }

            .small {

                display: none;

            }

        }
    </style>

</head>

<body>

    <div class="card">

        <div class="content">

            <div class="bubble">

                <img src="images/fish-yellow.png" class="shark">

            </div>

            <h1>Buon Compleanno</h1>

            <h2>Gabriele!</h2>

            <div class="years">
                🎂 2 ANNI 🎂
            </div>

            <div class="message">

                Caro Gabriele,

                <br><br>

                gli zii ti hanno preparato

                una piccola sorpresa

                tutta per te!

            </div>

            <div class="arrow">

                ⬇️

            </div>

            <div class="scan">

                Inquadra il QR Code
                con il telefono 📱

            </div>

            <div id="qrcode"></div>

            <div class="footer">

                ❤️ Con tanto affetto ❤️

                <br>

                Gli zii

            </div>

            <div class="small">

                Scansiona il QR e vivi
                una piccola avventura!

            </div>

        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>

        const QR_URL =
            "http://127.0.0.1:5500/inviti/auguri-gabriele/index.html";

        // Quando pubblicherai su GitHub Pages,
        // cambierai soltanto questa riga:
        //
        // const QR_URL =
        // "https://rodambrosio.github.io/greetings/inviti/auguri-gabriele/";


        new QRCode(document.getElementById("qrcode"), {

            text: QR_URL,

            width: 220,

            height: 220,

            colorDark: "#0057b8",

            colorLight: "#ffffff",

            correctLevel: QRCode.CorrectLevel.H

        });

    </script>

</body>

</html>
